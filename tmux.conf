set -gs base-index 1                          # Start window indexing at 1
set -gs bell-action any                       # Bells in any pane cause a bell for the window
set -gs default-terminal screen-256color      # Enable 256 color support
set -gs escape-time 1                         # Disable delay when waiting for keystrokes
set -gs history-limit 10000                   # Increase history limit
set -gs monitor-activity on                   # Highlight windows with activity
set -gs repeat-time 750                       # Allow for longer period of repeat key presses
set -gs renumber-windows on                   # Readjust window numbering when closing windows

set -gs display-panes-active-colour colour81  # Color of active pane text for pane info
set -gs display-panes-colour colour69         # Color of inactive pane text for pane info
set -gs display-panes-time 1000               # Display pane info for one seconds

set -gs status-interval 10                    # Refresh rate of status bar in seconds
set -gs status-justify left                   # Justify status blocks to the left
set -gs status-keys vi                        # Use vi-like keybindings in the command prompt
set -gs status-position top                   # Position of status bar relative to panes

set -gs status-fg colour253                   # Colour of status bar text
set -gs status-bg colour235                   # Color of status bar background
set -gs status-left-fg colour81              
set -gs status-left '#S #[fg=white]» '       
set -gs status-right ''                       # Empty the right part of the status bar

set -gs message-bg colour235                  # Command prompt background color
set -gs message-fg default                    # Command prompt text color

set -gs visual-activity off                   # Disable message for activity in another window
set -gs visual-bell off                       # Disable message for bell in another window
set -gs visual-silence off                    # Disable message for prolonged silence

setw -g clock-mode-colour colour81            # Keep clock color consistent with everything
setw -g clock-mode-style 24                   # 24 hour display format
setw -g monitor-activity on                   # Enable activity monitoring in other windows
setw -g monitor-silence 0                     # Disable prolonged silence monitoring
setw -g mode-keys vi                          # Use vi-like keybindings in copy mode
setw -g pane-base-index 1                     # Start pane indexing at 1

setw -g window-status-current-fg colour81     # Color of active window text
setw -g window-status-current-bg colour238    # Color of active window status block
setw -g window-status-current-format ' #I #[fg=colour255]#W '
setw -g window-status-fg colour69             # Color of inactive window text
setw -g window-status-bg colour235            # Color of inactive window status block
setw -g window-status-format ' #I #[fg=colour250]#W '
setw -g window-status-separator ' '           # Seperator between status blocks

setw -g pane-active-border-fg colour81        # Color of border for the active pane
setw -g window-status-activity-style none     # Remove existing styling
setw -g window-status-activity-fg colour164   # Highlight window index when there is activity
setw -g window-status-bell-bg colour164       # Highlight window index when there is a bell

unbind C-b                                    # Unbing existing prefix key
set -g prefix C-s                             # Have a sane prefix key
bind C-s send-prefix                          # Send prefix key upon hitting the key

# TODO: Can this read XDG_CONFIG_HOME instead?
bind r source-file ~/.config/tmux.conf        # Easily reload the tmux config

# Move around panes with vi-like key bindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -r S-Left swap-window -t -           # Rotate window order to the left
bind-key -r S-Right swap-window -t +          # Rotate window order to the right

# Use copy mode with more vi-like key bindings
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send -X cancel
unbind -T copy-mode-vi Space
